name: Rust

on:
  push:
    paths: 
    - "**.rs"
    - "**/Cargo.toml"
    - "**/rust-toolchain.toml"
    - ".github/workflows/rust.yml"
  pull_request:
  workflow_call:

env:
    CARGO_TERM_COLOR: always
    # Comma separated list of crates to check: '"crate1","crate_2"'
    CRATES: '"ninja-xtask"'

jobs:

  skip_check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5.3.1
        with:
          concurrent_skipping: 'same_content_newer'

  # indirection needed as fromJson will not read env context in matrix strategy
  crates:
    needs: skip_check
    if: needs.skip_check.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.crates.outputs.crates }}
    steps:
      - id: crates
        run: echo crates="${{ env.CRATES }}" >> $GITHUB_OUTPUT

  test:
    needs:
      - skip_check
      - crates
    if: needs.skip_check.outputs.should_skip != 'true'
    strategy:
      matrix:
        crate: ${{ fromJson(needs.crates.outputs.crates) }}
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Run tests
      run: cargo test

  lint:
    needs:
      - skip_check
      - crates
    if: needs.skip_check.outputs.should_skip != 'true'
    strategy:
      matrix:
        crate: ${{ fromJson(needs.crates.outputs.crates) }}
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: clippy
      run: cargo clippy -- --deny warnings

  fmt:
    needs:
      - skip_check
      - crates
    if: needs.skip_check.outputs.should_skip != 'true'
    strategy:
      matrix:
        crate: ${{ fromJson(needs.crates.outputs.crates) }}
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: fmt
      run: cargo fmt --check

  msrv:
    needs:
      - skip_check
      - crates
    if: needs.skip_check.outputs.should_skip != 'true'
    strategy:
      matrix:
        crate: ${{ fromJson(needs.crates.outputs.crates) }}
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    env:
      RUSTC_BOOTSTRAP: 1
    steps:
    - uses: actions/checkout@v6
    - name: install cargo-msrv
      uses: taiki-e/install-action@v2.75.27
      with:
        tool: cargo-msrv
    - name: check MSRV
      run: cargo msrv verify
